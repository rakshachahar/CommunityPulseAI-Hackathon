openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Smart Community AI Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: complaints
    description: Complaint operations
  - name: dashboard
    description: Dashboard and analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /complaints:
    get:
      operationId: listComplaints
      tags: [complaints]
      summary: List all complaints
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
        - name: order
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of complaints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Complaint"
    post:
      operationId: createComplaint
      tags: [complaints]
      summary: Submit a new complaint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplaintInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "400":
          description: Validation error

  /complaints/analyze:
    post:
      operationId: analyzeComplaint
      tags: [complaints]
      summary: AI analysis of a complaint image and description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeInput"
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiAnalysis"
        "400":
          description: Validation error

  /complaints/{id}:
    get:
      operationId: getComplaint
      tags: [complaints]
      summary: Get a complaint by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Complaint details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "404":
          description: Not found
    patch:
      operationId: updateComplaint
      tags: [complaints]
      summary: Update complaint status or priority
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplaintPatch"
      responses:
        "200":
          description: Updated complaint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "404":
          description: Not found
    delete:
      operationId: deleteComplaint
      tags: [complaints]
      summary: Delete a complaint
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Dashboard aggregate statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent:
    get:
      operationId: getDashboardRecent
      tags: [dashboard]
      summary: Recent complaints for dashboard
      responses:
        "200":
          description: Recent complaints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Complaint"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Complaint:
      type: object
      required:
        - id
        - description
        - location
        - status
        - priority
        - isAnonymous
        - aiAnalyzed
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        description:
          type: string
        location:
          type: string
        category:
          type: ["string", "null"]
        imageData:
          type: ["string", "null"]
        imageMimeType:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, in_progress, resolved, closed]
        priority:
          type: string
          enum: [low, medium, high, critical]
        isAnonymous:
          type: boolean
        reporterName:
          type: ["string", "null"]
        adminNotes:
          type: ["string", "null"]
        aiAnalyzed:
          type: boolean
        aiTitle:
          type: ["string", "null"]
        aiSummary:
          type: ["string", "null"]
        aiCategory:
          type: ["string", "null"]
        aiSeverityScore:
          type: ["integer", "null"]
        aiUrgency:
          type: ["string", "null"]
        aiDepartment:
          type: ["string", "null"]
        aiEnvironmentalImpact:
          type: ["string", "null"]
        aiResolutionEstimate:
          type: ["string", "null"]
        aiSuggestedActions:
          type: ["string", "null"]
        aiConfidenceScore:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ComplaintInput:
      type: object
      required:
        - description
        - location
      properties:
        description:
          type: string
          minLength: 1
        location:
          type: string
          minLength: 1
        category:
          type: string
        isAnonymous:
          type: boolean
        reporterName:
          type: string
        imageData:
          type: string
        imageMimeType:
          type: string
        aiTitle:
          type: string
        aiSummary:
          type: string
        aiCategory:
          type: string
        aiSeverityScore:
          type: integer
        aiUrgency:
          type: string
        aiDepartment:
          type: string
        aiEnvironmentalImpact:
          type: string
        aiResolutionEstimate:
          type: string
        aiSuggestedActions:
          type: string
        aiConfidenceScore:
          type: number
        aiAnalyzed:
          type: boolean
        priority:
          type: string

    ComplaintPatch:
      type: object
      properties:
        status:
          type: string
          enum: [pending, in_progress, resolved, closed]
        priority:
          type: string
          enum: [low, medium, high, critical]
        adminNotes:
          type: string

    AnalyzeInput:
      type: object
      required:
        - description
      properties:
        description:
          type: string
          minLength: 1
        category:
          type: string
        imageData:
          type: string
        imageMimeType:
          type: string

    AiAnalysis:
      type: object
      required:
        - title
        - summary
        - category
        - severityScore
        - urgency
        - department
        - environmentalImpact
        - resolutionEstimate
        - suggestedActions
        - confidenceScore
        - priority
      properties:
        title:
          type: string
        summary:
          type: string
        category:
          type: string
        severityScore:
          type: integer
        urgency:
          type: string
        department:
          type: string
        environmentalImpact:
          type: string
        resolutionEstimate:
          type: string
        suggestedActions:
          type: array
          items:
            type: string
        confidenceScore:
          type: number
        priority:
          type: string

    CategoryCount:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer

    StatusCount:
      type: object
      required: [status, count]
      properties:
        status:
          type: string
        count:
          type: integer

    PriorityCount:
      type: object
      required: [priority, count]
      properties:
        priority:
          type: string
        count:
          type: integer

    DashboardStats:
      type: object
      required:
        - total
        - pending
        - inProgress
        - resolved
        - closed
        - highPriority
        - byCategory
        - byStatus
        - byPriority
      properties:
        total:
          type: integer
        pending:
          type: integer
        inProgress:
          type: integer
        resolved:
          type: integer
        closed:
          type: integer
        highPriority:
          type: integer
        byCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        byStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        byPriority:
          type: array
          items:
            $ref: "#/components/schemas/PriorityCount"
